<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael Truono — Revenue Operator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #33ff33;
    font-family: 'Fira Mono', 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.15) 0px,
      rgba(0, 0, 0, 0.15) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Subtle screen flicker */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(51, 255, 51, 0.015);
    pointer-events: none;
    z-index: 9;
    animation: flicker 0.1s infinite alternate;
  }

  @keyframes flicker {
    from { opacity: 0.95; }
    to   { opacity: 1; }
  }

  .terminal {
    max-width: 720px;
    width: 90%;
    padding: 2rem;
  }

  .prompt::before {
    content: '> ';
    color: #33ff33;
  }

  .line {
    font-size: clamp(1rem, 3vw, 1.4rem);
    line-height: 1.6;
    min-height: 1.6em;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .line-sub {
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: #20cc20;
    min-height: 1.6em;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .cursor {
    display: inline-block;
    width: 0.6em;
    height: 1.15em;
    background: #33ff33;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .links {
    margin-top: 2.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .links.visible {
    opacity: 1;
  }

  .links a {
    color: #33ff33;
    text-decoration: none;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    border: 1px solid #33ff33;
    padding: 0.4rem 1rem;
    transition: background 0.2s, color 0.2s;
  }

  .links a:hover,
  .links a:focus {
    background: #33ff33;
    color: #0a0a0a;
    outline: none;
  }

  .divider {
    margin-top: 2rem;
    margin-bottom: 0.5rem;
    color: #1a991a;
    font-size: clamp(0.7rem, 2vw, 0.85rem);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .divider.visible {
    opacity: 1;
  }
</style>
</head>
<body>
  <div class="terminal">
    <div class="line prompt" id="line1"></div>
    <div class="line-sub prompt" id="line2" style="margin-top:0.6rem;"></div>
    <div class="divider" id="divider">————————————</div>
    <div class="links" id="links">
      <a href="https://linkedin.com/in/michaeltruono" target="_blank" rel="noopener">LinkedIn</a>
      <a href="mailto:hello@example.com">Email</a>
    </div>
  </div>

<script>
(function () {
  var line1Text = 'Michael Truono \u2014 Revenue Operator';
  var line2Text = 'Enterprise Sales \u00b7 Legal Tech \u00b7 GTM Strategy';
  var speed = 55;
  var pauseBetween = 600;

  var line1El = document.getElementById('line1');
  var line2El = document.getElementById('line2');
  var divider = document.getElementById('divider');
  var links = document.getElementById('links');

  var cursor = document.createElement('span');
  cursor.className = 'cursor';

  function type(el, text, cb) {
    var i = 0;
    el.appendChild(cursor);
    function next() {
      if (i < text.length) {
        cursor.before(text[i]);
        i++;
        setTimeout(next, speed + Math.random() * 30);
      } else if (cb) {
        cb();
      }
    }
    next();
  }

  type(line1El, line1Text, function () {
    setTimeout(function () {
      cursor.remove();
      type(line2El, line2Text, function () {
        setTimeout(function () {
          divider.classList.add('visible');
          links.classList.add('visible');
        }, 400);
      });
    }, pauseBetween);
  });
})();
</script>
</body>
</html>
